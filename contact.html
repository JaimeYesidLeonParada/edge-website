<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="contact-page">
        <div class="contact-container">
            
            <section class="contact-info">
                <h2>Let's Connect</h2>
                <p>Ready to deploy intelligent hardware solutions? Send us a message and our engineering team will get back to you.</p>
                <ul class="info-list">
                    <li><strong>Email:</strong> hello@edge-tech.com</li>
                    <li><strong>Location:</strong> Bogotá, Colombia</li>
                </ul>
            </section>

            <section class="contact-form-section">
                <form class="contact-form" action="https://formspree.io/f/xjgjroqq" method="POST">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" name="userName" placeholder="John Doe" required>
                    </div>
    
                    <div class="form-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" name="userEmail" placeholder="john@company.com" required>
                    </div>
    
                    <div class="form-group">
                        <label for="userMessage">Project Details</label>
                        <textarea id="userMessage" name="userMessage" rows="5" placeholder="Tell us about your hardware needs..." required></textarea>
                    </div>
    
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </section>

        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
